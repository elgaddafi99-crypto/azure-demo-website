<!DOCTYPE html>
<html>
<head>
    <title>Azure VM Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #0078D4, #00B4DB);
            color: white;
        }
        .container {
            margin-top: 100px;
        }
        h1 {
            font-size: 48px;
        }
        p {
            font-size: 22px;
        }
        .box {
            margin-top: 30px;
            padding: 20px;
            background: white;
            color: black;
            display: inline-block;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1> Welcome to My Azure VM</h1>
    <p>This website is deployed from GitHub</p>

    <div class="box">
        <h2>Server Info</h2>
        <p>Running on Ubuntu VM</p>
        <p>Hosted using Apache</p>
        <p>Cloned from GitHub Repository</p>
    </div>
</div>

</body>
</html>
